<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanish Patil TIB58</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <div id="stats">
            <span class="stat">XP: <strong><span id="xpText">0</span></strong></span>
            <span class="stat">Health: <strong><span id="healthText">100</span></strong></span>
            <span class="stat">Gold: <strong><span id="goldText">100</span></strong></span>
            <span class="stat">Damage: <strong><span id="damageText">10</span></strong></span>
            <span class="stat">Weapon: <strong><span id="weaponText">Stick</span></strong></span>
        </div>
        <div id="controls">
            <button id="store">Go to store</button>
            <button id="loc">Go to cave</button>
            <button id="fight">Fight!</button>
        </div>
        <div id="monsterstats">
            <span class="stat">Monster Name:<strong><span id="monstername"></span></strong></span><br>
            <span class="stat">Monster Health:<strong><span id="monsterhealth"></span></strong></span>
        </div>
        <div id="welcome">
            Welcome to the game. You must slay the dragon that is eating the people of Magentano.<br>
            You are in <strong>Town Square</strong> right now.
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
